<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas - Meygo ERP</title>
    <link rel="icon" type="image/png" href="../assets/images/icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/admin.css">
    <style>
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .summary-card { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 1.5rem; }
        .summary-icon { font-size: 2.5rem; padding: 1rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .icon-green { background: #dcfce7; color: #16a34a; }
        .icon-orange { background: #ffedd5; color: #ea580c; }
        .icon-blue { background: #dbeafe; color: #2563eb; }
        
        .form-row { display: flex; gap: 1rem; margin-bottom: 1rem; }
        .form-col { flex: 1; }
        
        #notificationArea { margin-bottom: 2rem; }
        .alert { padding: 1rem; border-radius: 5px; margin-bottom: 1rem; display: flex; align-items: center; gap: 10px; font-weight: 500; }
        .alert-success { background: #dcfce7; color: #166534; }
        .alert-error { background: #fee2e2; color: #991b1b; }
        
        .badge { padding: 0.3rem 0.6rem; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .badge-ingreso { background: #dcfce7; color: #16a34a; }
        .badge-egreso { background: #fee2e2; color: #dc2626; }
    </style>
</head>
<body>
    <div class="sidebar">
        <img src="../assets/images/logo.png" alt="Meygo Logo" class="sidebar-logo">
        <a href="index.html" class="nav-item"><i class="ph ph-squares-four"></i> Dashboard</a>
        <a href="create_document.html" class="nav-item"><i class="ph ph-file-plus"></i> Emitir Doc.</a>
        <a href="documents_registry.html" class="nav-item"><i class="ph ph-folders"></i> Documentos</a>
        <a href="finances.html" class="nav-item active"><i class="ph ph-chart-line-up"></i> Finanzas</a>
        <a href="receivables.html" class="nav-item"><i class="ph ph-hand-coins"></i> CxC</a>
        <a href="clients.html" class="nav-item"><i class="ph ph-users"></i> Clientes</a>
        <a href="users.html" class="nav-item"><i class="ph ph-users-three"></i> Usuarios</a>
        <a href="settings.html" class="nav-item"><i class="ph ph-gear"></i> Ajustes</a>
        <a href="#" id="logoutBtn" class="nav-item" style="margin-top: auto; color: var(--danger);"><i class="ph ph-sign-out"></i> Salir</a>
    </div>

    <div class="main-content page-fade-in">
        <div class="header stagger-1">
            <h1>Control Financiero</h1>
        </div>

        <div class="summary-grid stagger-2">
            <div class="summary-card">
                <div class="summary-icon icon-green"><i class="ph ph-trend-up"></i></div>
                <div class="summary-info">
                    <h3>Ingresos Totales</h3>
                    <p id="totalIngresos">$0.00</p>
                </div>
            </div>
            <div class="summary-card">
                <div class="summary-icon icon-orange"><i class="ph ph-trend-down"></i></div>
                <div class="summary-info">
                    <h3>Egresos Totales</h3>
                    <p id="totalEgresos">$0.00</p>
                </div>
            </div>
            <div class="summary-card">
                <div class="summary-icon icon-blue"><i class="ph ph-scales"></i></div>
                <div class="summary-info">
                    <h3>Balance Total</h3>
                    <p id="totalBalance">$0.00</p>
                </div>
            </div>
        </div>

        <div id="notificationArea" class="stagger-2"></div>

        <div class="card stagger-3">
            <h3>Registrar Movimiento</h3>
            <form id="addFinanceForm" style="margin-top: 1.5rem;">
                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label>Tipo *</label>
                            <select id="add_type" required>
                                <option value="Ingreso">Ingreso</option>
                                <option value="Egreso">Egreso (Gasto)</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label>Monto *</label>
                            <input type="number" step="0.01" id="add_amount" required>
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label>Moneda *</label>
                            <select id="add_currency" required>
                                <option value="USD">USD ($)</option>
                                <option value="VES">VES (Bs.)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-col" style="flex: 0.5;">
                        <div class="form-group">
                            <label>Metodo / Plataforma *</label>
                            <select id="add_payment_method" required>
                                <option value="Banco">Transferencia/Pago Movil</option>
                                <option value="Efectivo">Efectivo</option>
                                <option value="Binance">Binance / Crypto</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label>Descripcion / Concepto *</label>
                            <input type="text" id="add_description" required placeholder="Ej: Pago de material electrico">
                        </div>
                    </div>
                </div>

                <button type="submit" id="addSubmitBtn" class="btn-primary">Guardar Movimiento</button>
            </form>
        </div>

        <div class="card stagger-3">
            <h3>Historial de Movimientos</h3>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Tipo</th>
                            <th>Concepto</th>
                            <th>Metodo</th>
                            <th>Monto</th>
                            <th>Eliminar</th>
                        </tr>
                    </thead>
                    <tbody id="financesTableBody">
                        <tr><td colspan="6">Cargando movimientos...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabaseClient.js"></script>

    <script>
        if (localStorage.getItem('admin_logged_in') !== 'true') {
            window.location.href = '../index.html';
        }
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('admin_logged_in');
            localStorage.removeItem('admin_username');
            window.location.href = '../index.html';
        });

        function showNotification(msg, type = 'success') {
            const area = document.getElementById('notificationArea');
            const icon = type === 'success' ? 'ph-check-circle' : 'ph-warning';
            area.innerHTML = `<div class="alert alert-${type}"><i class="ph ${icon}"></i> ${msg}</div>`;
            setTimeout(() => { area.innerHTML = ''; }, 4000);
        }

        async function fetchFinances() {
            const tbody = document.getElementById('financesTableBody');
            try {
                const { data, error } = await supabaseClient.from('finances').select('*').order('created_at', { ascending: false });
                if (error) throw error;

                tbody.innerHTML = '';
                
                let inUSD = 0; let outUSD = 0;
                // Asumimos tasa 1 para VES temporalmente si no leemos settings, o mostramos montos en su moneda.
                // Lo mas optimo es sumar por moneda. Por ahora simplificado a USD/VES separado visualmente, o sumado bruto.
                
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6">No hay movimientos financieros.</td></tr>';
                    document.getElementById('totalIngresos').innerText = '$0.00';
                    document.getElementById('totalEgresos').innerText = '$0.00';
                    document.getElementById('totalBalance').innerText = '$0.00';
                    return;
                }

                data.forEach(record => {
                    const tr = document.createElement('tr');
                    const dateObj = new Date(record.created_at);
                    const formattedDate = !isNaN(dateObj) ? dateObj.toLocaleDateString() : 'N/A';
                    
                    const isIngreso = record.type === 'Ingreso';
                    const badgeClass = isIngreso ? 'badge-ingreso' : 'badge-egreso';
                    const colorMonto = isIngreso ? '#16a34a' : '#dc2626';
                    const simboloMoneda = record.currency === 'USD' ? '$' : 'Bs.';

                    // Sumar a totales (simplificado sin conversion por ahora)
                    if (record.currency === 'USD') {
                        if (isIngreso) inUSD += parseFloat(record.amount);
                        else outUSD += parseFloat(record.amount);
                    }

                    tr.innerHTML = `
                        <td>${formattedDate}</td>
                        <td><span class="badge ${badgeClass}">${record.type}</span></td>
                        <td>${record.description}</td>
                        <td><strong>${record.payment_method}</strong></td>
                        <td style="font-weight:700; color: ${colorMonto}">${simboloMoneda} ${parseFloat(record.amount).toFixed(2)}</td>
                        <td>
                            <button class="btn-sm" style="background: var(--danger);" onclick="deleteRecord(${record.id})" title="Eliminar"><i class="ph ph-trash"></i></button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                document.getElementById('totalIngresos').innerText = `$${inUSD.toFixed(2)} USD`;
                document.getElementById('totalEgresos').innerText = `$${outUSD.toFixed(2)} USD`;
                document.getElementById('totalBalance').innerText = `$${(inUSD - outUSD).toFixed(2)} USD`;

            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="6">Error: ${err.message}</td></tr>`;
            }
        }

        document.getElementById('addFinanceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('addSubmitBtn');
            btn.disabled = true; btn.innerHTML = 'Guardando...';

            const newRecord = {
                type: document.getElementById('add_type').value,
                amount: document.getElementById('add_amount').value,
                currency: document.getElementById('add_currency').value,
                payment_method: document.getElementById('add_payment_method').value,
                description: document.getElementById('add_description').value,
                created_by: localStorage.getItem('admin_username') || 'admin'
            };

            try {
                const { error } = await supabaseClient.from('finances').insert([newRecord]);
                if (error) throw error;
                
                showNotification('Movimiento registrado exitosamente.');
                document.getElementById('addFinanceForm').reset();
                fetchFinances();
            } catch (err) {
                showNotification(err.message, 'error');
            } finally {
                btn.disabled = false; btn.innerHTML = 'Guardar Movimiento';
            }
        });

        async function deleteRecord(id) {
            if (!confirm(`Seguro que deseas eliminar este movimiento?`)) return;
            try {
                const { error } = await supabaseClient.from('finances').delete().eq('id', id);
                if (error) throw error;
                
                showNotification('Movimiento eliminado.');
                fetchFinances();
            } catch (err) {
                showNotification(err.message, 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', fetchFinances);
    </script>
</body>
</html>
